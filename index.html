<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>patrimôme</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0f14; color: #f0ece0; font-family: 'DM Sans', 'Segoe UI', sans-serif; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    @keyframes spin   { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #252a38; border-radius: 2px; }
    select option { background: #1a1e28; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Config ────────────────────────────────────────────────────────────────────
const SHEET_ID = "1txYkGtXlLqnfLUrN6JJbTuhlszC_Vl692GpVV3ePt5I";
const API_KEY  = "AIzaSyBMsCYdwNmFuFwN1OF2FTcbtarE9ZTLRRU";
const BASE     = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;
const SHEETS   = { assets: "Assets", debts: "Debts", snapshots: "Snapshots" };

const ASSET_HEADERS = ["id","name","type","value","costBasis","notes","createdAt"];
const DEBT_HEADERS  = ["id","name","type","value","notes"];
const SNAP_HEADERS  = ["date","brut","net"];

async function gGet(sheet, headers) {
  const col = String.fromCharCode(64 + headers.length);
  const r = await fetch(`${BASE}/values/${sheet}!A:${col}?key=${API_KEY}`);
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  const rows = d.values || [];
  if (rows.length < 2) return [];
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] ?? ""; });
    return obj;
  });
}

async function gSave(sheet, headers, items) {
  // Clear
  await fetch(`${BASE}/values/${sheet}!A:Z:clear?key=${API_KEY}`, { method: "POST", headers: {"Content-Type":"application/json"} });
  // Write
  const values = [headers, ...items.map(it => headers.map(h => it[h] ?? ""))];
  await fetch(`${BASE}/values/${encodeURIComponent(sheet+"!A1")}?valueInputOption=RAW&key=${API_KEY}`, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ range: sheet+"!A1", majorDimension:"ROWS", values })
  });
}

// ── Palette ───────────────────────────────────────────────────────────────────
const C = {
  bg:"#0d0f14", surface:"#14171f", card:"#1a1e28", border:"#252a38",
  accent:"#e8c547", text:"#f0ece0", muted:"#7a8099",
  green:"#4ade80", red:"#f87171", blue:"#60a5fa",
  purple:"#a78bfa", orange:"#fb923c", teal:"#2dd4bf",
};

const ASSET_TYPES = [
  { id:"pea",     label:"PEA",            icon:"📈", color:C.green,   financial:true  },
  { id:"cto",     label:"CTO",            icon:"📊", color:C.blue,    financial:true  },
  { id:"livret",  label:"Livrets",        icon:"💰", color:C.teal,    financial:true  },
  { id:"fonds_e", label:"Fonds €",        icon:"🛡️", color:"#a3e635", financial:true  },
  { id:"crypto",  label:"Crypto",         icon:"₿",  color:C.accent,  financial:true  },
  { id:"private", label:"Private Equity", icon:"🔒", color:"#f472b6", financial:true  },
  { id:"immo",    label:"Immobilier",     icon:"🏠", color:C.orange,  financial:false },
  { id:"scpi",    label:"SCPI",           icon:"🏢", color:C.purple,  financial:false },
  { id:"autre",   label:"Autre",          icon:"📦", color:C.muted,   financial:false },
];

const DEBT_TYPES = [
  { id:"credit_immo",  label:"Crédit immobilier", icon:"🏦" },
  { id:"credit_conso", label:"Crédit conso",      icon:"💳" },
  { id:"autre_dette",  label:"Autre dette",        icon:"📋" },
];

const fmt = n => new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(Number(n)||0);
const pct = (a,b) => Number(b)===0 ? "0.0" : ((Number(a)/Number(b))*100).toFixed(1);
const typeOf     = id => ASSET_TYPES.find(t=>t.id===id) || ASSET_TYPES[8];
const debtTypeOf = id => DEBT_TYPES.find(t=>t.id===id)  || DEBT_TYPES[2];

// ── Donut SVG ─────────────────────────────────────────────────────────────────
function Donut({ data, size=120, centerLabel }) {
  const r=42, cx=60, cy=60, circ=2*Math.PI*r;
  const total = data.reduce((s,d)=>s+d.value,0);
  if (!total) return <div style={{width:size,height:size}}/>;
  let cum=0;
  const slices = data.map(d => {
    const pv=d.value/total, da=`${pv*circ} ${circ}`, rot=cum*360-90;
    cum+=pv;
    return {...d,da,rot};
  });
  return (
    <svg width={size} height={size} viewBox="0 0 120 120">
      {slices.map((s,i)=>(
        <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color}
          strokeWidth="14" strokeDasharray={s.da} strokeDashoffset="0"
          transform={`rotate(${s.rot} ${cx} ${cy})`} strokeLinecap="butt"/>
      ))}
      <circle cx={cx} cy={cy} r={33} fill={C.card}/>
      {centerLabel && <>
        <text x="60" y="57" textAnchor="middle" fill={C.muted} fontSize="8" fontFamily="DM Sans,sans-serif">{centerLabel.line1}</text>
        <text x="60" y="68" textAnchor="middle" fill={C.text} fontSize="9" fontWeight="700" fontFamily="DM Sans,sans-serif">{centerLabel.line2}</text>
      </>}
    </svg>
  );
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function Sparkline({ values, color=C.accent, width=80, height=32 }) {
  if (!values||values.length<2) return null;
  const min=Math.min(...values), max=Math.max(...values), range=max-min||1;
  const pts = values.map((v,i)=>`${(i/(values.length-1))*width},${height-((v-min)/range)*height}`).join(" ");
  return <svg width={width} height={height} style={{overflow:"visible"}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/></svg>;
}

// ── KPI Card ──────────────────────────────────────────────────────────────────
function KpiCard({ label, sublabel, value, color, delta, sparkValues, onClick, active }) {
  return (
    <div onClick={onClick} style={{
      background:active?color+"18":C.card, border:`1.5px solid ${active?color:C.border}`,
      borderRadius:14, padding:"18px 20px", cursor:onClick?"pointer":"default",
      transition:"all .15s", flex:1, minWidth:160,
    }}>
      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:active?color:C.muted,marginBottom:4}}>{label}</div>
      {sublabel&&<div style={{fontSize:11,color:C.muted,marginBottom:8}}>{sublabel}</div>}
      <div style={{fontSize:22,fontWeight:800,letterSpacing:"-1px",color:color||C.text}}>{value}</div>
      {delta!==undefined&&<div style={{fontSize:12,color:delta>=0?C.green:C.red,marginTop:4}}>{delta>=0?"▲":"▼"} {fmt(Math.abs(delta))} P&L</div>}
      {sparkValues&&sparkValues.length>1&&<div style={{marginTop:8}}><Sparkline values={sparkValues} color={color||C.accent}/></div>}
    </div>
  );
}

// ── Sync Badge ────────────────────────────────────────────────────────────────
function SyncBadge({ status }) {
  const map = {
    loading:{ label:"Chargement…",   color:C.accent },
    saving: { label:"Sauvegarde…",   color:C.accent },
    ok:     { label:"✓ Synchronisé", color:C.green  },
    error:  { label:"⚠ Erreur Sheets — vérifiez le partage du Sheet", color:C.red },
  };
  const s = map[status]||{label:"",color:C.muted};
  return (
    <div style={{fontSize:11,color:s.color,display:"flex",alignItems:"center",gap:5}}>
      {(status==="loading"||status==="saving")&&
        <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",border:`2px solid ${C.accent}`,borderTopColor:"transparent",animation:"spin 0.7s linear infinite"}}/>}
      {s.label}
    </div>
  );
}

// ── Input / Select helpers ────────────────────────────────────────────────────
const inputStyle = { width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box" };
const labelStyle = { display:"block",fontSize:12,fontWeight:600,color:C.muted,marginBottom:5 };
const addBtnStyle = { background:C.accent,color:C.bg,border:"none",borderRadius:10,padding:"10px 18px",cursor:"pointer",fontWeight:700,fontSize:13 };
const ghostBtnStyle = { background:"transparent",border:`1px solid ${C.border}`,color:C.text,borderRadius:10,padding:"10px 18px",cursor:"pointer",fontWeight:600,fontSize:13 };
const rowStyle = { display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:8 };

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const { useState, useEffect, useCallback, useRef } = React;

  const [assets,    setAssets]    = useState([]);
  const [debts,     setDebts]     = useState([]);
  const [snapshots, setSnapshots] = useState([]);
  const [sync,      setSync]      = useState("loading");
  const [view,      setView]      = useState("dashboard");
  const [highlight, setHighlight] = useState(null);

  const [showAF, setShowAF] = useState(false);
  const [showDF, setShowDF] = useState(false);
  const [editAId, setEditAId] = useState(null);
  const [editDId, setEditDId] = useState(null);
  const [aForm, setAForm] = useState({name:"",type:"pea",value:"",costBasis:"",notes:""});
  const [dForm, setDForm] = useState({name:"",type:"credit_immo",value:"",notes:""});

  const [aiMsgs,    setAiMsgs]    = useState([]);
  const [aiInput,   setAiInput]   = useState("");
  const [aiLoading, setAiLoading] = useState(false);

  const timer = useRef(null);

  // Load
  useEffect(()=>{
    (async()=>{
      setSync("loading");
      try {
        const [a,d,s] = await Promise.all([
          gGet(SHEETS.assets, ASSET_HEADERS),
          gGet(SHEETS.debts,  DEBT_HEADERS),
          gGet(SHEETS.snapshots, SNAP_HEADERS),
        ]);
        setAssets(a.map(x=>({...x,value:Number(x.value)||0,costBasis:Number(x.costBasis)||0})));
        setDebts(d.map(x=>({...x,value:Number(x.value)||0})));
        setSnapshots(s.map(x=>({...x,brut:Number(x.brut)||0,net:Number(x.net)||0})));
        setSync("ok");
      } catch { setSync("error"); }
    })();
  },[]);

  const persist = useCallback((a,d,s)=>{
    if(timer.current) clearTimeout(timer.current);
    setSync("saving");
    timer.current = setTimeout(async()=>{
      try {
        await Promise.all([
          gSave(SHEETS.assets,    ASSET_HEADERS, a),
          gSave(SHEETS.debts,     DEBT_HEADERS,  d),
          gSave(SHEETS.snapshots, SNAP_HEADERS,  s),
        ]);
        setSync("ok");
      } catch { setSync("error"); }
    }, 1200);
  },[]);

  const updA = a => { setAssets(a);  persist(a, debts, snapshots); };
  const updD = d => { setDebts(d);   persist(assets, d, snapshots); };

  // Snapshot
  useEffect(()=>{
    if(!assets.length) return;
    const today = new Date().toISOString().split("T")[0];
    const brut  = assets.reduce((s,a)=>s+Number(a.value),0);
    const net   = brut - debts.reduce((s,d)=>s+Number(d.value),0);
    setSnapshots(prev=>{
      const next=[...prev.filter(s=>s.date!==today),{date:today,brut,net}].slice(-365);
      persist(assets,debts,next);
      return next;
    });
  },[assets,debts]);

  // Totals
  const totalBrut      = assets.reduce((s,a)=>s+Number(a.value),0);
  const totalDettes    = debts.reduce((s,d)=>s+Number(d.value),0);
  const totalNet       = totalBrut-totalDettes;
  const totalFin       = assets.filter(a=>ASSET_TYPES.find(t=>t.id===a.type)?.financial).reduce((s,a)=>s+Number(a.value),0);
  const totalCost      = assets.reduce((s,a)=>s+Number(a.costBasis||a.value),0);
  const totalPnL       = totalBrut-totalCost;

  const groupData = ASSET_TYPES.reduce((acc,t)=>{
    const sum=assets.filter(a=>a.type===t.id).reduce((s,a)=>s+Number(a.value),0);
    if(sum>0) acc.push({label:t.label,value:sum,color:t.color,financial:t.financial});
    return acc;
  },[]);

  const hAssets = highlight==="financier" ? assets.filter(a=>ASSET_TYPES.find(t=>t.id===a.type)?.financial) : assets;
  const hGroup  = highlight==="financier" ? groupData.filter(g=>g.financial) : groupData;

  // Asset form
  const openAddA  = ()=>{ setAForm({name:"",type:"pea",value:"",costBasis:"",notes:""}); setEditAId(null); setShowAF(true); };
  const openEditA = a=>{ setAForm({name:a.name,type:a.type,value:a.value,costBasis:a.costBasis||"",notes:a.notes||""}); setEditAId(a.id); setShowAF(true); };
  const submitA   = ()=>{
    if(!aForm.name||!aForm.value) return;
    const obj={...aForm,value:Number(aForm.value),costBasis:Number(aForm.costBasis)||Number(aForm.value)};
    if(editAId) updA(assets.map(a=>a.id===editAId?{...a,...obj}:a));
    else        updA([...assets,{...obj,id:Date.now().toString(),createdAt:new Date().toISOString()}]);
    setShowAF(false);
  };

  // Debt form
  const openAddD  = ()=>{ setDForm({name:"",type:"credit_immo",value:"",notes:""}); setEditDId(null); setShowDF(true); };
  const openEditD = d=>{ setDForm({name:d.name,type:d.type,value:d.value,notes:d.notes||""}); setEditDId(d.id); setShowDF(true); };
  const submitD   = ()=>{
    if(!dForm.name||!dForm.value) return;
    const obj={...dForm,value:Number(dForm.value)};
    if(editDId) updD(debts.map(d=>d.id===editDId?{...d,...obj}:d));
    else        updD([...debts,{...obj,id:Date.now().toString()}]);
    setShowDF(false);
  };

  // AI
  const sendAI = useCallback(async()=>{
    if(!aiInput.trim()||aiLoading) return;
    const msg=aiInput.trim(); setAiInput("");
    const msgs=[...aiMsgs,{role:"user",content:msg}]; setAiMsgs(msgs); setAiLoading(true);
    const ctx=`Tu es un conseiller patrimoine expert. Données utilisateur :
ACTIFS: ${JSON.stringify(assets.map(a=>({nom:a.name,type:a.type,valeur:a.value,pr:a.costBasis})))}
PASSIF: ${JSON.stringify(debts.map(d=>({nom:d.name,valeur:d.value})))}
Brut:${fmt(totalBrut)} Net:${fmt(totalNet)} Financier:${fmt(totalFin)} PnL:${fmt(totalPnL)}
Réponds en français, concis et actionnable.`;
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:ctx,messages:msgs})});
      const data=await res.json();
      setAiMsgs([...msgs,{role:"assistant",content:data.content?.find(b=>b.type==="text")?.text||"Erreur."}]);
    } catch { setAiMsgs([...msgs,{role:"assistant",content:"Erreur de connexion."}]); }
    setAiLoading(false);
  },[aiInput,aiLoading,aiMsgs,assets,debts,totalBrut,totalNet,totalFin,totalPnL]);

  const sparkBrut = snapshots.slice(-30).map(s=>Number(s.brut));
  const sparkNet  = snapshots.slice(-30).map(s=>Number(s.net));

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,paddingBottom:80}}>

      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:17,fontWeight:800,letterSpacing:"-0.5px"}}>patri<span style={{color:C.accent}}>môme</span></div>
        <nav style={{display:"flex",gap:4}}>
          {[["dashboard","Dashboard"],["assets","Actifs & Dettes"],["ai","IA Conseil"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setView(id)} style={{background:view===id?C.accent:"transparent",color:view===id?C.bg:C.muted,border:"none",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>{lbl}</button>
          ))}
        </nav>
        <SyncBadge status={sync}/>
      </div>

      <div style={{maxWidth:920,margin:"0 auto",padding:"24px 16px"}}>

        {/* ── DASHBOARD ── */}
        {view==="dashboard" && <>
          {/* KPIs */}
          <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
            <KpiCard label="Patrimoine brut"      sublabel="Somme de tous les actifs"        value={fmt(totalBrut)} color={C.accent}                     delta={totalPnL}  sparkValues={sparkBrut} active={highlight==="brut"}      onClick={()=>setHighlight(h=>h==="brut"?"null":"brut")} />
            <KpiCard label="Patrimoine net"       sublabel={`Brut − ${fmt(totalDettes)} dettes`} value={fmt(totalNet)}  color={totalNet>=0?C.green:C.red} sparkValues={sparkNet}  active={highlight==="net"}       onClick={()=>setHighlight(h=>h==="net"?null:"net")} />
            <KpiCard label="Patrimoine financier" sublabel="PEA · CTO · Livrets · Crypto"    value={fmt(totalFin)}  color={C.blue}                                               active={highlight==="financier"} onClick={()=>setHighlight(h=>h==="financier"?null:"financier")} />
          </div>

          {highlight&&<div style={{fontSize:12,color:C.muted,marginBottom:14,textAlign:"center"}}>
            {highlight==="financier"?"📊 Filtré actifs financiers":highlight==="net"?"🔍 Net = actifs − passif":"🔍 Brut = tous les actifs"} · Cliquer à nouveau pour tout afficher
          </div>}

          {/* Donut + synthèse */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:C.muted,marginBottom:12}}>Répartition</div>
              {!groupData.length ? <div style={{color:C.muted,textAlign:"center",padding:"30px 0"}}>Aucun actif saisi</div> : (
                <div style={{display:"flex",alignItems:"center",gap:16}}>
                  <Donut data={hGroup} size={120} centerLabel={highlight==="financier"?{line1:"financier",line2:pct(totalFin,totalBrut)+"%"}:null}/>
                  <div style={{flex:1}}>
                    {(highlight==="financier"?hGroup:groupData).sort((a,b)=>b.value-a.value).map(d=>(
                      <div key={d.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <div style={{width:7,height:7,borderRadius:"50%",background:d.color}}/>
                          <span style={{fontSize:12}}>{d.label}</span>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:12,fontWeight:700}}>{pct(d.value,totalBrut)}%</div>
                          <div style={{fontSize:10,color:C.muted}}>{fmt(d.value)}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:C.muted,marginBottom:12}}>Synthèse</div>
              {[
                {label:"Actifs bruts",          value:totalBrut,           color:C.accent},
                {label:"Dont financier",         value:totalFin,            color:C.blue,   indent:true},
                {label:"Dont réel (immo/SCPI)",  value:totalBrut-totalFin,  color:C.orange, indent:true},
                {label:"Passif (dettes)",        value:-totalDettes,        color:C.red},
                {label:"Patrimoine NET",         value:totalNet,            color:totalNet>=0?C.green:C.red, bold:true},
              ].map(row=>(
                <div key={row.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingLeft:row.indent?14:0}}>
                  <div style={{fontSize:row.bold?14:13,fontWeight:row.bold?700:400,color:row.bold?C.text:C.muted}}>
                    {row.indent&&<span style={{color:C.border,marginRight:6}}>└</span>}{row.label}
                  </div>
                  <div style={{fontSize:row.bold?15:13,fontWeight:700,color:row.color}}>{fmt(row.value)}</div>
                </div>
              ))}
              {!debts.length&&<div style={{textAlign:"center",marginTop:8}}><button onClick={()=>setView("assets")} style={{...ghostBtnStyle,padding:"6px 12px",fontSize:12}}>+ Ajouter des dettes</button></div>}
            </div>
          </div>

          {/* Top actifs */}
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:C.muted,marginBottom:12}}>Top actifs{highlight==="financier"?" (financiers)":""}</div>
            {!assets.length ? (
              <div style={{textAlign:"center",padding:"30px 0"}}><button style={addBtnStyle} onClick={()=>setView("assets")}>Commencer</button></div>
            ) : (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10}}>
                {hAssets.sort((a,b)=>Number(b.value)-Number(a.value)).slice(0,6).map(a=>{
                  const t=typeOf(a.type), pnl=Number(a.value)-Number(a.costBasis||a.value);
                  return (
                    <div key={a.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <span style={{fontSize:20}}>{t.icon}</span>
                        <span style={{fontSize:10,fontWeight:700,background:t.color+"22",color:t.color,borderRadius:20,padding:"2px 8px"}}>{t.label}</span>
                      </div>
                      <div style={{fontSize:13,fontWeight:600,marginTop:8}}>{a.name}</div>
                      <div style={{fontSize:16,fontWeight:800,marginTop:4}}>{fmt(a.value)}</div>
                      {a.costBasis&&Number(a.costBasis)!==Number(a.value)&&<div style={{fontSize:11,color:pnl>=0?C.green:C.red,marginTop:2}}>{pnl>=0?"+":""}{fmt(pnl)}</div>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Histogramme */}
          {snapshots.length>1&&(
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20,marginTop:16}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:C.muted,marginBottom:12}}>Évolution 30 jours</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:2,height:56}}>
                {snapshots.slice(-30).map((s,i)=>{
                  const vals=snapshots.slice(-30).map(x=>Number(x.brut));
                  const min=Math.min(...vals),max=Math.max(...vals);
                  const h=max===min?28:Math.max(4,((Number(s.brut)-min)/(max-min))*52);
                  return <div key={i} style={{flex:1}} title={`${s.date} — Brut: ${fmt(s.brut)}`}><div style={{height:h,background:C.accent+"55",borderRadius:2}}/></div>;
                })}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11,color:C.muted}}>
                <span>{snapshots.slice(-30)[0]?.date}</span>
                <span style={{color:C.accent,fontWeight:600}}>Brut</span>
                <span>{snapshots.slice(-1)[0]?.date}</span>
              </div>
            </div>
          )}
        </>}

        {/* ── ACTIFS & DETTES ── */}
        {view==="assets" && <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:18,fontWeight:700}}>Actifs <span style={{fontSize:14,color:C.muted,fontWeight:400}}>{fmt(totalBrut)}</span></div>
            <button style={addBtnStyle} onClick={openAddA}>+ Actif</button>
          </div>

          {["financial","real"].map(group=>{
            const gT=ASSET_TYPES.filter(t=>(group==="financial")===t.financial);
            const gA=assets.filter(a=>gT.some(t=>t.id===a.type));
            if(!gA.length) return null;
            const gTot=gA.reduce((s,a)=>s+Number(a.value),0);
            return (
              <div key={group} style={{marginBottom:24}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:group==="financial"?C.blue:C.orange}}>
                    {group==="financial"?"📊 Patrimoine financier":"🏠 Patrimoine réel"}
                  </div>
                  <div style={{marginLeft:"auto",fontSize:13,fontWeight:700,color:group==="financial"?C.blue:C.orange}}>{fmt(gTot)}</div>
                </div>
                {gT.filter(t=>assets.some(a=>a.type===t.id)).map(t=>(
                  <div key={t.id} style={{marginBottom:14}}>
                    <div style={{fontSize:12,fontWeight:600,color:t.color,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                      {t.icon} {t.label} <span style={{color:C.muted,fontWeight:400}}>— {fmt(assets.filter(a=>a.type===t.id).reduce((s,a)=>s+Number(a.value),0))}</span>
                    </div>
                    {assets.filter(a=>a.type===t.id).map(a=>{
                      const pnl=Number(a.value)-Number(a.costBasis||a.value);
                      const pp=a.costBasis?((pnl/Number(a.costBasis))*100).toFixed(1):"0.0";
                      return (
                        <div key={a.id} style={rowStyle}>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:600,fontSize:14}}>{a.name}</div>
                            {a.notes&&<div style={{fontSize:12,color:C.muted}}>{a.notes}</div>}
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontWeight:700,fontSize:15}}>{fmt(a.value)}</div>
                            {a.costBasis&&Number(a.costBasis)!==Number(a.value)&&<div style={{fontSize:11,color:pnl>=0?C.green:C.red}}>{pnl>=0?"+":""}{fmt(pnl)} ({pnl>=0?"+":""}{pp}%)</div>}
                          </div>
                          <button onClick={()=>openEditA(a)} style={{...ghostBtnStyle,padding:"5px 9px",fontSize:12}}>✏️</button>
                          <button onClick={()=>updA(assets.filter(x=>x.id!==a.id))} style={{...ghostBtnStyle,padding:"5px 9px",fontSize:12,color:C.red}}>🗑️</button>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            );
          })}

          {!assets.length&&<div style={{textAlign:"center",padding:"40px 0",color:C.muted}}>
            <div style={{fontSize:40,marginBottom:12}}>💼</div>
            <div style={{marginBottom:16}}>Aucun actif — commencez par votre PEA ou un livret</div>
            <button style={addBtnStyle} onClick={openAddA}>+ Ajouter un actif</button>
          </div>}

          {/* Passif */}
          <div style={{borderTop:`1px solid ${C.border}`,marginTop:8,paddingTop:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:700}}>Passif <span style={{fontSize:14,color:C.red,fontWeight:400}}>−{fmt(totalDettes)}</span></div>
              <button style={{...addBtnStyle,background:C.red+"22",color:C.red}} onClick={openAddD}>+ Dette</button>
            </div>
            {debts.map(d=>{
              const dt=debtTypeOf(d.type);
              return (
                <div key={d.id} style={rowStyle}>
                  <span style={{fontSize:18}}>{dt.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14}}>{d.name}</div>
                    {d.notes&&<div style={{fontSize:12,color:C.muted}}>{d.notes}</div>}
                  </div>
                  <div style={{fontWeight:700,fontSize:15,color:C.red}}>−{fmt(d.value)}</div>
                  <button onClick={()=>openEditD(d)} style={{...ghostBtnStyle,padding:"5px 9px",fontSize:12}}>✏️</button>
                  <button onClick={()=>updD(debts.filter(x=>x.id!==d.id))} style={{...ghostBtnStyle,padding:"5px 9px",fontSize:12,color:C.red}}>🗑️</button>
                </div>
              );
            })}
            {!debts.length&&<div style={{color:C.muted,fontSize:13,padding:"16px 0"}}>Aucune dette — ajoutez vos crédits pour calculer le patrimoine net.</div>}
            {debts.length>0&&<div style={{textAlign:"right",fontSize:13,fontWeight:700,color:C.muted,marginTop:8}}>
              Net = {fmt(totalBrut)} − {fmt(totalDettes)} = <span style={{color:totalNet>=0?C.green:C.red}}>{fmt(totalNet)}</span>
            </div>}
          </div>
        </>}

        {/* ── IA ── */}
        {view==="ai"&&(
          <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 180px)"}}>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:12,fontSize:13,color:C.muted}}>
              💡 L'IA connaît votre patrimoine brut ({fmt(totalBrut)}), net ({fmt(totalNet)}) et financier ({fmt(totalFin)}).
            </div>
            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
              {!aiMsgs.length&&(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"40px 20px",textAlign:"center"}}>
                  <div style={{fontSize:34,marginBottom:10}}>🤖</div>
                  <div style={{fontWeight:600,marginBottom:6}}>Conseiller patrimonial IA</div>
                  <div style={{fontSize:13,color:C.muted,marginBottom:18}}>Posez n'importe quelle question sur votre patrimoine</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
                    {["Analyse ma diversification","Mon taux d'endettement est-il sain ?","Optimise ma fiscalité","Financier vs immobilier ?"].map(q=>(
                      <button key={q} onClick={()=>setAiInput(q)} style={{...ghostBtnStyle,borderRadius:20,padding:"7px 14px",fontSize:12}}>{q}</button>
                    ))}
                  </div>
                </div>
              )}
              {aiMsgs.map((m,i)=>(
                <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                  <div style={{
                    background:m.role==="user"?C.accent+"18":C.surface,
                    border:`1px solid ${m.role==="user"?C.accent+"44":C.border}`,
                    borderRadius:12,padding:"12px 16px",maxWidth:"85%",
                    alignSelf:m.role==="user"?"flex-end":"flex-start",
                    fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap",
                  }}>{m.content}</div>
                </div>
              ))}
              {aiLoading&&<div style={{display:"flex"}}><div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px"}}>
                <span style={{display:"inline-flex",gap:4}}>
                  {[0,1,2].map(i=><span key={i} style={{width:6,height:6,borderRadius:"50%",background:C.muted,display:"inline-block",animation:`bounce 1s ${i*0.2}s infinite`}}/>)}
                </span>
              </div></div>}
            </div>
            <div style={{display:"flex",gap:10}}>
              <input style={{...inputStyle,flex:1}} placeholder="Posez votre question…" value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendAI()}/>
              <button onClick={sendAI} disabled={aiLoading||!aiInput.trim()} style={{...addBtnStyle,opacity:aiLoading||!aiInput.trim()?0.5:1}}>Envoyer</button>
            </div>
          </div>
        )}
      </div>

      {/* Modal Actif */}
      {showAF&&(
        <div style={{position:"fixed",inset:0,background:"#00000099",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&setShowAF(false)}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:28,width:"100%",maxWidth:420}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:18}}>{editAId?"Modifier":"Ajouter"} un actif</div>
            <div style={{marginBottom:12}}><label style={labelStyle}>Nom</label><input style={inputStyle} placeholder="PEA Boursorama, Appartement Valence…" value={aForm.name} onChange={e=>setAForm({...aForm,name:e.target.value})}/></div>
            <div style={{marginBottom:12}}><label style={labelStyle}>Catégorie</label><select style={inputStyle} value={aForm.type} onChange={e=>setAForm({...aForm,type:e.target.value})}>{ASSET_TYPES.map(t=><option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}</select></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div><label style={labelStyle}>Valeur actuelle (€)</label><input style={inputStyle} type="number" placeholder="0" value={aForm.value} onChange={e=>setAForm({...aForm,value:e.target.value})}/></div>
              <div><label style={labelStyle}>Prix de revient (€)</label><input style={inputStyle} type="number" placeholder="optionnel" value={aForm.costBasis} onChange={e=>setAForm({...aForm,costBasis:e.target.value})}/></div>
            </div>
            <div style={{marginBottom:18}}><label style={labelStyle}>Notes</label><input style={inputStyle} placeholder="ISIN, adresse…" value={aForm.notes} onChange={e=>setAForm({...aForm,notes:e.target.value})}/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowAF(false)} style={{flex:1,...ghostBtnStyle}}>Annuler</button>
              <button onClick={submitA} style={{flex:2,...addBtnStyle}}>{editAId?"Enregistrer":"Ajouter"}</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal Dette */}
      {showDF&&(
        <div style={{position:"fixed",inset:0,background:"#00000099",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&setShowDF(false)}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:28,width:"100%",maxWidth:420}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:18}}>{editDId?"Modifier":"Ajouter"} une dette</div>
            <div style={{marginBottom:12}}><label style={labelStyle}>Nom</label><input style={inputStyle} placeholder="Crédit CIC, LOA voiture…" value={dForm.name} onChange={e=>setDForm({...dForm,name:e.target.value})}/></div>
            <div style={{marginBottom:12}}><label style={labelStyle}>Type</label><select style={inputStyle} value={dForm.type} onChange={e=>setDForm({...dForm,type:e.target.value})}>{DEBT_TYPES.map(t=><option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}</select></div>
            <div style={{marginBottom:12}}><label style={labelStyle}>Capital restant dû (€)</label><input style={inputStyle} type="number" placeholder="0" value={dForm.value} onChange={e=>setDForm({...dForm,value:e.target.value})}/></div>
            <div style={{marginBottom:18}}><label style={labelStyle}>Notes</label><input style={inputStyle} placeholder="Taux, durée restante…" value={dForm.notes} onChange={e=>setDForm({...dForm,notes:e.target.value})}/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowDF(false)} style={{flex:1,...ghostBtnStyle}}>Annuler</button>
              <button onClick={submitD} style={{flex:2,...addBtnStyle,background:C.red+"22",color:C.red}}>{editDId?"Enregistrer":"Ajouter"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
